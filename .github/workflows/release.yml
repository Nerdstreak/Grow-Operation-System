name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: GrowDiary.React/package-lock.json

      - name: Build portable release ZIP
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          ./scripts/publish-release.ps1 -Version $version -Runtime "portable"

      - name: Create draft prerelease
        uses: softprops/action-gh-release@v2
        with:
          name: Grow OS ${{ github.ref_name }}
          draft: true
          prerelease: true
          files: artifacts/releases/*.zip
