name: CI

on:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: GrowDiary.React/package-lock.json

      - name: Restore backend
        run: dotnet restore GrowDiary.slnx

      - name: Build backend
        run: dotnet build GrowDiary.Web/GrowDiary.Web.csproj --configuration Release --no-restore

      - name: Build backend tests
        run: dotnet build GrowDiary.Web.Tests/GrowDiary.Web.Tests.csproj --configuration Release --no-restore

      - name: Test backend
        run: dotnet test GrowDiary.Web.Tests/GrowDiary.Web.Tests.csproj --configuration Release --no-build --verbosity minimal

      - name: Install frontend
        working-directory: GrowDiary.React
        run: npm ci

      - name: Lint frontend
        working-directory: GrowDiary.React
        run: npm run lint

      - name: Build frontend
        working-directory: GrowDiary.React
        run: npm run build

      - name: Install Playwright browser
        working-directory: GrowDiary.React
        run: npx playwright install --with-deps chromium

      - name: E2E smoke tests
        working-directory: GrowDiary.React
        run: npm run test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: GrowDiary.React/playwright-report/
          retention-days: 7
