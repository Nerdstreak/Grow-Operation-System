name: Docker image

# Baut ein Multi-Arch-Image (Raspberry Pi arm64/arm32 + PC amd64) und pusht es
# nach GHCR, damit Nutzer es per Installer nur noch herunterladen (statt selbst
# bauen) muessen. Laeuft bei jedem v*-Tag und kann manuell gestartet werden.
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- Home Assistant add-on images -------------------------------------
      # The add-on references image: ghcr.io/<repo>-{arch}:<version>, so the
      # Supervisor pulls a prebuilt image directly (no on-device build). Updates
      # are then a clean image pull instead of a rebuild against a cached base —
      # no reinstall, and the /data volume is preserved.
      - name: Resolve add-on version + lowercase image base
        id: addon
        run: |
          echo "version=$(grep -E '^version:' grow-os/config.yaml | sed -E 's/.*"(.*)".*/\1/')" >> "$GITHUB_OUTPUT"
          echo "base=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Build add-on image (aarch64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ steps.addon.outputs.base }}-aarch64:${{ steps.addon.outputs.version }}
            ${{ steps.addon.outputs.base }}-aarch64:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build add-on image (armv7)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm/v7
          push: true
          tags: |
            ${{ steps.addon.outputs.base }}-armv7:${{ steps.addon.outputs.version }}
            ${{ steps.addon.outputs.base }}-armv7:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build add-on image (amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.addon.outputs.base }}-amd64:${{ steps.addon.outputs.version }}
            ${{ steps.addon.outputs.base }}-amd64:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
