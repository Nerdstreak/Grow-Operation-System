name: Docker image

# Baut ein Multi-Arch-Image (Raspberry Pi arm64/arm32 + PC amd64) und pusht es
# nach GHCR, damit Nutzer es per Installer nur noch herunterladen (statt selbst
# bauen) muessen. Laeuft bei jedem v*-Tag und kann manuell gestartet werden.
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Read add-on version
        id: addonver
        run: |
          V=$(grep -E '^version:' grow-os/config.yaml | sed -E 's/[^0-9.]//g')
          echo "version=$V" >> "$GITHUB_OUTPUT"

      # The add-on version tag (type=raw below) lets the Home Assistant add-on pull
      # ghcr.io/<repo>:<version> directly — clean, buildless updates that preserve /data.
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest
            type=raw,value=${{ steps.addonver.outputs.version }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
