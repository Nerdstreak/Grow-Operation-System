<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Grow OS – Full App Mock</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:       oklch(10% 0.018 155);
  --surface:  oklch(14% 0.018 155);
  --surface2: oklch(17.5% 0.02 155);
  --surface3: oklch(22% 0.022 155);
  --border:   oklch(30% 0.02 155 / 0.55);
  --border2:  oklch(40% 0.02 155 / 0.7);
  --text:     oklch(94% 0.01 150);
  --muted:    oklch(58% 0.02 150);
  --faint:    oklch(38% 0.015 150);
  --green:    oklch(74% 0.19 145);
  --green-bg: oklch(74% 0.19 145 / 0.1);
  --amber:    oklch(78% 0.17 72);
  --amber-bg: oklch(78% 0.17 72 / 0.1);
  --red:      oklch(66% 0.22 25);
  --red-bg:   oklch(66% 0.22 25 / 0.1);
  --blue:     oklch(70% 0.16 240);
  --blue-bg:  oklch(70% 0.16 240 / 0.1);
  --radius:   10px;
  --sidebar:  228px;
  --mono:     'IBM Plex Mono', monospace;
}
html[data-theme="light"] {
  --bg:       oklch(96% 0.008 150);
  --surface:  oklch(99% 0.005 150);
  --surface2: oklch(95% 0.008 150);
  --surface3: oklch(92% 0.01 150);
  --border:   oklch(80% 0.015 150 / 0.7);
  --border2:  oklch(65% 0.015 150 / 0.8);
  --text:     oklch(15% 0.02 155);
  --muted:    oklch(45% 0.025 155);
  --faint:    oklch(65% 0.015 155);
  --green-bg: oklch(74% 0.19 145 / 0.08);
  --amber-bg: oklch(78% 0.17 72 / 0.08);
  --red-bg:   oklch(66% 0.22 25 / 0.08);
  --blue-bg:  oklch(70% 0.16 240 / 0.08);
}
html,body { height:100%; font-family:'Inter',system-ui,sans-serif; background:var(--bg); color:var(--text); font-size:14px; line-height:1.5; }
.app { display:flex; height:100vh; overflow:hidden; }

/* SIDEBAR */
.sidebar { width:var(--sidebar); min-width:var(--sidebar); background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; }
.sidebar-logo { padding:20px 18px 16px; border-bottom:1px solid var(--border); }
.logo-mark { width:28px; height:28px; background:var(--green); border-radius:7px; display:inline-flex; align-items:center; justify-content:center; margin-bottom:10px; }
.logo-name { font-size:13px; font-weight:700; letter-spacing:-0.02em; }
.logo-sub  { font-size:11px; color:var(--muted); margin-top:1px; }
.sidebar-nav { flex:1; padding:10px; display:flex; flex-direction:column; gap:2px; overflow-y:auto; }
.nav-item { display:flex; align-items:center; gap:10px; padding:8px 10px; border-radius:7px; color:var(--muted); font-size:13px; font-weight:500; cursor:pointer; transition:background 0.12s,color 0.12s; border:none; background:none; width:100%; text-align:left; }
.nav-item:hover { background:var(--surface2); color:var(--text); }
.nav-item.active { background:var(--surface3); color:var(--text); }
.nav-item .badge-dot { width:5px; height:5px; border-radius:50%; background:var(--red); margin-left:auto; }
.nav-icon { width:16px; height:16px; opacity:0.65; flex-shrink:0; }
.nav-section { font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:0.08em; color:var(--faint); padding:14px 10px 4px; }
.sidebar-footer { padding:12px 10px; border-top:1px solid var(--border); display:flex; flex-direction:column; gap:6px; }
.btn-primary { display:flex; align-items:center; justify-content:center; gap:7px; padding:9px 14px; background:var(--green); color:oklch(10% 0.02 155); border-radius:7px; font-size:13px; font-weight:700; cursor:pointer; border:none; transition:opacity 0.12s; }
.btn-primary:hover { opacity:0.88; }
.theme-toggle { width:30px; height:30px; border-radius:6px; border:1px solid var(--border); background:transparent; color:var(--muted); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:15px; transition:background 0.12s; }
.theme-toggle:hover { background:var(--surface2); color:var(--text); }

/* CONTENT */
.content { flex:1; display:flex; flex-direction:column; overflow:hidden; }
.topbar { display:flex; align-items:center; justify-content:space-between; padding:14px 28px; border-bottom:1px solid var(--border); background:var(--surface); gap:16px; flex-shrink:0; }
.topbar-left { display:flex; align-items:center; gap:10px; }
.topbar-title { font-size:15px; font-weight:600; letter-spacing:-0.02em; }
.topbar-right { display:flex; align-items:center; gap:10px; }
.btn-ghost { display:inline-flex; align-items:center; gap:6px; padding:6px 12px; border-radius:6px; border:1px solid var(--border); background:transparent; color:var(--muted); font-size:12px; font-weight:500; cursor:pointer; transition:color 0.12s,border-color 0.12s,background 0.12s; }
.btn-ghost:hover { color:var(--text); border-color:var(--border2); background:var(--surface2); }
.btn-accent { background:var(--green); color:oklch(10% 0.02 155); border:none; font-weight:600; }
.btn-accent:hover { opacity:0.88; color:oklch(10% 0.02 155); }
.page-scroll { flex:1; overflow-y:auto; padding:24px 28px; }

/* ALERT BAR */
.alert-bar { display:flex; align-items:center; gap:12px; padding:10px 28px; background:var(--red-bg); border-bottom:1px solid var(--red); font-size:13px; flex-shrink:0; }
.alert-dot { width:7px; height:7px; border-radius:50%; background:var(--red); flex-shrink:0; animation:pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
.alert-bar strong { color:var(--red); font-weight:600; }
.alert-bar-more { margin-left:auto; color:var(--muted); font-size:12px; cursor:pointer; white-space:nowrap; }

/* CARDS & SURFACES */
.card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; }
.card-pad { padding:18px 20px; }
.card-header { display:flex; align-items:center; justify-content:space-between; padding:13px 16px; border-bottom:1px solid var(--border); }
.card-title { font-size:12px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:0.06em; }

/* STATS ROW */
.stats-row { display:flex; gap:10px; margin-bottom:18px; flex-wrap:wrap; }
.stat-chip { padding:8px 14px; background:var(--surface); border:1px solid var(--border); border-radius:7px; font-size:12px; color:var(--muted); }
.stat-chip strong { color:var(--text); font-size:18px; font-family:var(--mono); display:block; line-height:1.1; margin-bottom:1px; }

/* SECTION LABEL */
.section-label { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.08em; color:var(--faint); margin-bottom:10px; margin-top:20px; }
.section-label:first-child { margin-top:0; }

/* STATUS BADGE */
.badge { display:inline-flex; align-items:center; padding:3px 8px; border-radius:999px; font-size:11px; font-weight:600; }
.badge-ok      { background:var(--green-bg); color:var(--green); }
.badge-warn    { background:var(--amber-bg); color:var(--amber); }
.badge-crit    { background:var(--red-bg);   color:var(--red); }
.badge-info    { background:var(--blue-bg);  color:var(--blue); }
.badge-neutral { background:var(--surface3); color:var(--muted); }

/* STATUS PILL */
.status-pill { display:flex; align-items:center; gap:5px; font-size:11px; font-weight:600; padding:4px 8px; border-radius:999px; }
.status-pill.ok   { color:var(--green); background:var(--green-bg); }
.status-pill.warn { color:var(--amber); background:var(--amber-bg); }
.status-pill.crit { color:var(--red);   background:var(--red-bg); }
.status-dot { width:5px; height:5px; border-radius:50%; background:currentColor; }

/* TENT CARD */
.tent-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; cursor:pointer; transition:border-color 0.14s,box-shadow 0.14s; }
.tent-card:hover { border-color:var(--border2); box-shadow:0 4px 24px oklch(0% 0 0 / 0.18); }
.tent-card.is-crit { border-color:oklch(66% 0.22 25 / 0.4); }
.tent-card.is-warn { border-color:oklch(78% 0.17 72 / 0.35); }
.tc-header { display:flex; align-items:center; justify-content:space-between; padding:14px 16px 12px; border-bottom:1px solid var(--border); }
.tc-name { font-size:14px; font-weight:600; letter-spacing:-0.02em; }
.tc-meta { font-size:11px; color:var(--muted); margin-top:1px; }
.tc-metrics { display:grid; grid-template-columns:repeat(3,1fr); gap:0; }
.tc-metric { padding:13px 16px; border-right:1px solid var(--border); border-bottom:1px solid var(--border); }
.tc-metric:last-child { border-right:none; }
.tc-divider { grid-column:1/-1; padding:6px 16px 4px; font-size:10px; text-transform:uppercase; letter-spacing:0.07em; color:var(--faint); font-weight:600; background:var(--surface2); border-top:1px solid var(--border); border-bottom:1px solid var(--border); }
.tc-metric-label { font-size:10px; text-transform:uppercase; letter-spacing:0.07em; color:var(--muted); margin-bottom:4px; font-weight:600; }
.tc-metric-value { font-family:var(--mono); font-size:22px; font-weight:500; letter-spacing:-0.03em; line-height:1; color:var(--text); }
.tc-metric-value.ok   { color:var(--green); }
.tc-metric-value.warn { color:var(--amber); }
.tc-metric-value.crit { color:var(--red); }
.tc-metric-unit   { font-size:10px; color:var(--muted); margin-top:3px; font-family:var(--mono); }
.tc-metric-target { font-size:10px; color:var(--faint); margin-top:2px; }
.tc-footer { display:flex; align-items:center; justify-content:space-between; padding:10px 14px; background:var(--surface2); }
.tc-runs { display:flex; gap:6px; flex-wrap:wrap; }
.tc-run-pill { font-size:11px; color:var(--muted); padding:3px 8px; border:1px solid var(--border); border-radius:999px; cursor:pointer; transition:color 0.1s,border-color 0.1s; }
.tc-run-pill:hover { color:var(--text); border-color:var(--border2); }
.tc-open-btn { font-size:11px; font-weight:500; color:var(--muted); padding:4px 10px; border:1px solid var(--border); border-radius:6px; background:none; cursor:pointer; }
.tc-open-btn:hover { color:var(--text); border-color:var(--border2); }

/* CAM */
.cam-strip { position:relative; border-top:1px solid var(--border); overflow:hidden; border-radius:0 0 calc(var(--radius) - 1px) calc(var(--radius) - 1px); }
.cam-placeholder { width:100%; aspect-ratio:16/9; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px; background:repeating-linear-gradient(45deg,var(--surface2) 0,var(--surface2) 10px,var(--surface3) 10px,var(--surface3) 20px); color:var(--faint); font-size:10px; font-family:var(--mono); }
.cam-large-placeholder { width:100%; aspect-ratio:16/9; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; background:repeating-linear-gradient(45deg,var(--surface2) 0,var(--surface2) 12px,var(--surface3) 12px,var(--surface3) 24px); color:var(--faint); font-size:11px; font-family:var(--mono); border-radius:var(--radius); margin-bottom:16px; }
.cam-live-badge { position:absolute; top:8px; left:8px; display:flex; align-items:center; gap:5px; padding:3px 8px; background:oklch(0% 0 0 / 0.55); border-radius:999px; font-size:10px; font-weight:600; color:#fff; }
.cam-live-dot { width:5px; height:5px; border-radius:50%; background:var(--red); animation:pulse 2s infinite; }
.cam-age { position:absolute; bottom:8px; right:8px; padding:2px 7px; background:oklch(0% 0 0 / 0.5); border-radius:4px; font-size:10px; color:rgba(255,255,255,0.7); font-family:var(--mono); }
.cam-refresh { position:absolute; top:10px; right:10px; padding:4px 10px; background:oklch(0% 0 0/0.5); border:1px solid rgba(255,255,255,0.15); border-radius:6px; color:rgba(255,255,255,0.8); font-size:11px; cursor:pointer; }

/* METRIC BLOCKS (detail) */
.metric-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(120px,1fr)); gap:10px; margin-bottom:16px; }
.metric-block { padding:16px; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); }
.metric-block-label { font-size:10px; text-transform:uppercase; letter-spacing:0.07em; color:var(--muted); font-weight:600; margin-bottom:8px; }
.metric-block-val { font-family:var(--mono); font-size:30px; font-weight:500; letter-spacing:-0.04em; line-height:1; }
.metric-block-val.ok { color:var(--green); } .metric-block-val.warn { color:var(--amber); } .metric-block-val.crit { color:var(--red); } .metric-block-val.neutral { color:var(--text); }
.metric-block-unit  { font-size:11px; color:var(--muted); margin-top:4px; font-family:var(--mono); }
.metric-block-range { font-size:10px; color:var(--faint); margin-top:3px; }

/* CHART PLACEHOLDER */
.chart-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:18px 20px; }
.chart-card-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
.chart-card-title { font-size:13px; font-weight:600; }
.chart-legend { display:flex; gap:12px; }
.legend-item { display:flex; align-items:center; gap:5px; font-size:11px; color:var(--muted); }
.legend-dot { width:6px; height:6px; border-radius:50%; }
.chart-area { width:100%; height:130px; }

/* TASK / SIDE PANEL */
.side-panel { display:flex; flex-direction:column; gap:14px; }
.panel-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; }
.panel-card-header { display:flex; align-items:center; justify-content:space-between; padding:12px 14px; border-bottom:1px solid var(--border); }
.panel-card-title { font-size:12px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:0.06em; }
.panel-card-count { font-size:11px; color:var(--faint); background:var(--surface2); padding:2px 7px; border-radius:999px; }
.task-item { display:flex; align-items:flex-start; gap:10px; padding:10px 14px; border-bottom:1px solid var(--border); transition:background 0.1s; cursor:default; }
.task-item:last-child { border-bottom:none; }
.task-item:hover { background:var(--surface2); }
.task-check { width:14px; height:14px; border-radius:4px; border:1px solid var(--border2); flex-shrink:0; margin-top:1px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:background 0.1s,border-color 0.1s; }
.task-check:hover { border-color:var(--green); }
.task-check.done { background:var(--green); border-color:var(--green); }
.task-title { font-size:12px; font-weight:500; }
.task-sub   { font-size:11px; color:var(--muted); margin-top:1px; }
.prio-dot { width:6px; height:6px; border-radius:50%; margin-top:4px; flex-shrink:0; }
.prio-high { background:var(--red); } .prio-med { background:var(--amber); } .prio-low { background:var(--faint); }

/* FOCUS CARD */
.focus-card { padding:14px 16px; }
.focus-label { font-size:10px; text-transform:uppercase; letter-spacing:0.07em; color:var(--muted); font-weight:600; margin-bottom:6px; }
.focus-title { font-size:13px; font-weight:600; margin-bottom:4px; }
.focus-body  { font-size:12px; color:var(--muted); line-height:1.5; }

/* OPS LAYOUT */
.ops-layout { display:grid; grid-template-columns:1fr 260px; gap:20px; align-items:start; }
.tents-grid { display:grid; gap:14px; grid-template-columns:repeat(auto-fill,minmax(340px,1fr)); }
.detail-layout { display:grid; grid-template-columns:1fr 260px; gap:20px; align-items:start; }

/* GROWS TABLE */
.data-table { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; }
.data-table-header { display:grid; padding:10px 16px; border-bottom:1px solid var(--border); background:var(--surface2); }
.data-table-header span { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.06em; color:var(--faint); }
.data-row { display:grid; padding:12px 16px; border-bottom:1px solid var(--border); align-items:center; cursor:pointer; transition:background 0.1s; }
.data-row:last-child { border-bottom:none; }
.data-row:hover { background:var(--surface2); }
.grows-cols { grid-template-columns:2fr 1fr 1fr 1fr 1fr 60px; }
.row-name   { font-size:13px; font-weight:500; }
.row-sub    { font-size:11px; color:var(--muted); margin-top:1px; }
.row-val    { font-family:var(--mono); font-size:13px; }
.row-muted  { font-size:12px; color:var(--muted); }

/* TIMELINE */
.timeline-item { display:flex; gap:14px; padding:12px 0; border-bottom:1px solid var(--border); }
.timeline-item:last-child { border-bottom:none; }
.tl-dot-col { display:flex; flex-direction:column; align-items:center; padding-top:3px; }
.tl-dot { width:8px; height:8px; border-radius:50%; border:1.5px solid var(--border2); background:var(--surface3); flex-shrink:0; }
.tl-dot.measurement { background:var(--green); border-color:var(--green); }
.tl-dot.journal     { background:var(--blue);  border-color:var(--blue); }
.tl-dot.task        { background:var(--amber); border-color:var(--amber); }
.tl-line { flex:1; width:1px; background:var(--border); margin-top:4px; }
.tl-title { font-size:13px; font-weight:500; }
.tl-sub   { font-size:11px; color:var(--muted); margin-top:2px; }
.tl-time  { font-size:11px; color:var(--faint); white-space:nowrap; font-family:var(--mono); }

/* MEASUREMENT FORM */
.meas-form { display:grid; gap:20px; }
.meas-section-title { font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:0.08em; color:var(--muted); margin-bottom:12px; padding-bottom:8px; border-bottom:1px solid var(--border); }
.meas-fields { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:12px; }
.meas-field { display:grid; gap:6px; }
.meas-field label { font-size:11px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:0.06em; }
.meas-field-inner { position:relative; }
.meas-input { width:100%; background:var(--surface2); border:1.5px solid var(--border); color:var(--text); border-radius:8px; padding:12px 14px; font-family:var(--mono); font-size:22px; font-weight:500; outline:none; transition:border-color 0.15s, box-shadow 0.15s; }
.meas-input:focus { border-color:var(--green); box-shadow:0 0 0 3px oklch(74% 0.19 145 / 0.15); }
.meas-input.ok   { border-color:oklch(74% 0.19 145 / 0.5); }
.meas-input.warn { border-color:oklch(78% 0.17 72  / 0.5); }
.meas-unit { position:absolute; right:12px; top:50%; transform:translateY(-50%); font-size:11px; color:var(--faint); font-family:var(--mono); pointer-events:none; }
.meas-target { font-size:10px; color:var(--faint); margin-top:4px; }
.meas-target .hit  { color:var(--green); }
.meas-target .miss { color:var(--amber); }

/* ANALYSE */
.analyse-layout { display:grid; grid-template-columns:1fr 1fr; gap:20px; align-items:start; }
.analyse-picker { display:flex; gap:10px; margin-bottom:18px; align-items:center; }
.analyse-select { background:var(--surface2); border:1px solid var(--border); color:var(--text); border-radius:7px; padding:7px 12px; font-size:13px; outline:none; cursor:pointer; font-family:'Inter',sans-serif; }
.compare-table { width:100%; border-collapse:collapse; font-size:13px; }
.compare-table th { text-align:left; padding:10px 14px; font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.06em; color:var(--faint); border-bottom:1px solid var(--border); background:var(--surface2); }
.compare-table td { padding:11px 14px; border-bottom:1px solid var(--border); font-family:var(--mono); }
.compare-table tr:last-child td { border-bottom:none; }
.compare-table td:first-child { font-family:'Inter',sans-serif; font-size:12px; color:var(--muted); font-weight:500; }
.td-ok   { color:var(--green); } .td-warn { color:var(--amber); } .td-neu  { color:var(--text); }

/* EINSTELLUNGEN */
.settings-layout { display:grid; grid-template-columns:1fr 1fr; gap:20px; align-items:start; }
.settings-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; }
.settings-card-header { padding:14px 18px; border-bottom:1px solid var(--border); background:var(--surface2); }
.settings-card-title { font-size:13px; font-weight:600; }
.settings-card-sub { font-size:11px; color:var(--muted); margin-top:2px; }
.settings-body { padding:18px; display:grid; gap:14px; }
.field { display:grid; gap:6px; }
.field label { font-size:12px; font-weight:600; color:var(--muted); }

.field input.mono { font-family:var(--mono); font-size:12px; }
.field-hint { font-size:11px; color:var(--faint); margin-top:2px; }
.ha-status { display:flex; align-items:center; gap:8px; padding:10px 12px; border-radius:7px; font-size:12px; font-weight:500; }

.ha-status.disconnected { background:var(--red-bg);   color:var(--red); }
.ha-status-dot { width:7px; height:7px; border-radius:50%; background:currentColor; }
.sensor-table { width:100%; border-collapse:collapse; }

.sensor-input:focus { border-color:var(--green); }
.sensor-last-val { font-family:var(--mono); font-size:11px; color:var(--green); }

/* WISSEN */
.wissen-layout { display:grid; grid-template-columns:200px 1fr; gap:20px; align-items:start; }
.phase-nav { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; }
.phase-nav-item { padding:11px 14px; font-size:13px; font-weight:500; color:var(--muted); cursor:pointer; border-bottom:1px solid var(--border); transition:background 0.1s,color 0.1s; display:flex; justify-content:space-between; align-items:center; }

.phase-nav-item:hover { background:var(--surface2); color:var(--text); }

.phase-week-badge { font-size:10px; color:var(--faint); font-family:var(--mono); }
.wissen-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; }

.wissen-body  { padding:20px 22px; display:grid; gap:20px; }

.wissen-notes { font-size:13px; color:var(--muted); line-height:1.6; }
.wissen-notes li { margin-top:6px; }

// ─── FAKE CHART ──────────────────────────────────────────────────────────────
function FakeChart({c1="#4ec99a",c2="#6b8fe0",h=130}) {
  const p1=[[0,80],[50,68],[100,55],[150,62],[200,48],[250,52],[300,38],[320,30]];
  const p2=[[0,100],[50,92],[100,85],[150,90],[200,78],[250,74],[300,66],[320,58]];
  const line=pts=>pts.map((p,i)=>`${i===0?'M':'L'}${p[0]},${p[1]}`).join(' ');
  const area=pts=>`${line(pts)} L${pts.at(-1)[0]},${h} L0,${h} Z`;
  return <svg viewBox={`0 0 320 ${h}`} preserveAspectRatio="none" style={{width:'100%',height:h}}>
    <defs>
      <linearGradient id="g1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={c1} stopOpacity=".18"/><stop offset="100%" stopColor={c1} stopOpacity="0"/></linearGradient>
      <linearGradient id="g2" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={c2} stopOpacity=".12"/><stop offset="100%" stopColor={c2} stopOpacity="0"/></linearGradient>
    </defs>
    <path d={area(p1)} fill="url(#g1)"/><path d={area(p2)} fill="url(#g2)"/>
    <path d={line(p1)} fill="none" stroke={c1} strokeWidth="1.8" strokeLinejoin="round" strokeLinecap="round"/>
    <path d={line(p2)} fill="none" stroke={c2} strokeWidth="1.8" strokeLinejoin="round" strokeLinecap="round"/>
  </svg>;
}

function MiniSparkline({color="#4ec99a"}) {

// ─── MESSUNG EINTRAGEN ────────────────────────────────────────────────────────
function MessungView({growId,onBack}) {
  const grow=GROWS.find(g=>g.id===growId)||GROWS[0];
  const [vals,setVals]=useState({ph:'',ec:'',orp:'',wtemp:'',do_:'',temp:'',hum:'',vpd:'',ppfd:'',co2:''});
  const set=(k,v)=>setVals(prev=>({...prev,[k]:v}));

  const inRange=(v,min,max)=>{
    const n=parseFloat(v);
    if(isNaN(n)||v==='') return null;
    return n>=min&&n<=max?'ok':'warn';
  };

  const fields_reservoir=[
    {k:'ph',   label:'pH',          unit:'',       min:5.8, max:6.2, step:'0.01', placeholder:'6.0'},
    {k:'ec',   label:'EC',          unit:'mS/cm',  min:1.6, max:2.0, step:'0.01', placeholder:'1.8'},
    {k:'orp',  label:'ORP',         unit:'mV',     min:300, max:400, step:'1',    placeholder:'340'},
    {k:'wtemp',label:'Wassertemp.', unit:'°C',     min:18,  max:22,  step:'0.1',  placeholder:'20.5'},
    {k:'do_',  label:'DO',          unit:'mg/L',   min:6,   max:12,  step:'0.1',  placeholder:'8.0'},
  ];
  const fields_klima=[
    {k:'temp', label:'Temperatur',  unit:'°C',     min:22, max:26,  step:'0.1', placeholder:'24.0'},
    {k:'hum',  label:'Luftfeuchte', unit:'%',      min:55, max:65,  step:'1',   placeholder:'60'},
    {k:'vpd',  label:'VPD',         unit:'kPa',    min:0.8,max:1.2, step:'0.01',placeholder:'1.0'},
    {k:'ppfd', label:'PPFD',        unit:'µmol',   min:400,max:600, step:'10',  placeholder:'500'},
    {k:'co2',  label:'CO₂',         unit:'ppm',    min:800,max:1200,step:'10',  placeholder:'1000'},
  ];

  const MeasField=({f})=>{
    const st=inRange(vals[f.k],f.min,f.max);
    return <div className="meas-field">
      <label>{f.label}</label>
      <div className="meas-field-inner">
        <input className={`meas-input${st?' '+st:''}`} type="number" step={f.step} placeholder={f.placeholder}
          value={vals[f.k]} onChange={e=>set(f.k,e.target.value)}/>
        {f.unit&&<span className="meas-unit">{f.unit}</span>}
      </div>
      <div className="meas-target">
        Soll: {f.min}–{f.max} {f.unit}
        {st&&<span className={` ${st}`}> · {st==='ok'?'✓ im Bereich':'⚠ außerhalb'}</span>}
      </div>
    </div>;
  };

  return <>
    <Topbar title="Messung eintragen" onBack={onBack} backLabel={grow.name}>
      <span style={{fontSize:12,color:'var(--muted)'}}>{grow.week} · Tag {grow.day}</span>
      <button className="btn-ghost btn-accent">Speichern</button>
    </Topbar>
    <div className="page-scroll">
      <div style={{display:'grid',gridTemplateColumns:'1fr 280px',gap:20,alignItems:'start'}}>
        <div>
          <div className="card" style={{marginBottom:16}}>
            <div className="card-pad">
              <div className="meas-section-title">Reservoir</div>
              <div className="meas-fields">
                {fields_reservoir.map(f=><MeasField key={f.k} f={f}/>)}
              </div>
            </div>
          </div>
          <div className="card">
            <div className="card-pad">
              <div className="meas-section-title">Klima</div>
              <div className="meas-fields">
                {fields_klima.map(f=><MeasField key={f.k} f={f}/>)}
              </div>
            </div>
          </div>

          <div className="card">
            <div className="card-pad">

                      <option>Maßnahme</option>

// ─── ANALYSE VIEW ─────────────────────────────────────────────────────────────
function AnalyseView() {
  const [g1,setG1]=useState(1);
  const [g2,setG2]=useState(4);
  const grow1=GROWS.find(g=>g.id===g1)||GROWS[0];
  const grow2=GROWS.find(g=>g.id===g2)||GROWS[3];
  const metrics=[
    {label:'pH',         g1:'6.1',  g2:'6.0',  s1:'ok',   s2:'ok',   target:'5.8–6.2'},
    {label:'EC',         g1:'2.1',  g2:'1.8',  s1:'warn', s2:'ok',   target:'1.6–2.0'},
    {label:'ORP',        g1:'342',  g2:'331',  s1:'ok',   s2:'ok',   target:'300–400 mV'},
    {label:'W.-Temp',    g1:'21.2', g2:'20.4', s1:'ok',   s2:'ok',   target:'18–22 °C'},
    {label:'VPD',        g1:'1.42', g2:'1.08', s1:'warn', s2:'ok',   target:'0.8–1.2'},
    {label:'Temperatur', g1:'29.4', g2:'24.1', s1:'crit', s2:'ok',   target:'22–26 °C'},
    {label:'Luftfeuchte',g1:'68',   g2:'61',   s1:'warn', s2:'ok',   target:'55–65 %'},
  ];
  return <div className="page-scroll">
    <div className="analyse-picker">
      <span style={{fontSize:12,color:'var(--muted)',fontWeight:600}}>Vergleich:</span>
      <select className="analyse-select" value={g1} onChange={e=>setG1(Number(e.target.value))}>
        {GROWS.map(g=><option key={g.id} value={g.id}>{g.name}</option>)}
      </select>
      <span style={{color:'var(--faint)'}}>vs.</span>
      <select className="analyse-select" value={g2} onChange={e=>setG2(Number(e.target.value))}>
        {GROWS.map(g=><option key={g.id} value={g.id}>{g.name}</option>)}
      </select>
    </div>

    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:20}}>
      {[grow1,grow2].map((g,i)=><div key={i} className="card" style={{padding:'14px 16px'}}>
        <div style={{fontSize:13,fontWeight:600}}>{g.name}</div>
        <div style={{fontSize:11,color:'var(--muted)',marginTop:2}}>{g.strain} · {g.week} · Tag {g.day}</div>
        <div style={{display:'flex',gap:12,marginTop:10}}>
          <div style={{fontFamily:'var(--mono)',fontSize:20,color:'var(--green)'}}>{g.ph}<span style={{fontSize:10,color:'var(--muted)',marginLeft:3}}>pH</span></div>
          <div style={{fontFamily:'var(--mono)',fontSize:20,color:'var(--text)'}}>{g.ec}<span style={{fontSize:10,color:'var(--muted)',marginLeft:3}}>EC</span></div>
          <div style={{marginLeft:'auto'}}><MiniSparkline color={i===0?'#4ec99a':'#6b8fe0'}/></div>
        </div>
      </div>)}
    </div>

    <div className="section-label">pH & EC Verlauf – 7 Tage</div>
    <div className="chart-card" style={{marginBottom:16}}>
      <div className="chart-card-header">
        <span className="chart-card-title">pH-Verlauf im Vergleich</span>
        <div className="chart-legend">
          <div className="legend-item"><div className="legend-dot" style={{background:'#4ec99a'}}/>{grow1.name}</div>
          <div className="legend-item"><div className="legend-dot" style={{background:'#6b8fe0'}}/>{grow2.name}</div>
        </div>
      </div>
      <div className="chart-area"><FakeChart c1="#4ec99a" c2="#6b8fe0" h={140}/></div>
    </div>

    <div className="section-label">Metriken im Vergleich · aktuell</div>
    <div className="data-table">
      <table className="compare-table" style={{width:'100%'}}>
        <thead>
          <tr>
            <th>Metrik</th>
            <th>{grow1.name}</th>
            <th>{grow2.name}</th>
            <th>Sollbereich</th>
          </tr>
        </thead>
        <tbody>
          {metrics.map(m=><tr key={m.label}>
            <td>{m.label}</td>
            <td className={`td-${m.s1}`}>{m.g1}</td>
            <td className={`td-${m.s2}`}>{m.g2}</td>
            <td style={{color:'var(--faint)',fontFamily:'var(--mono)',fontSize:11}}>{m.target}</td>
          </tr>)}
        </tbody>
      </table>
    </div>
  </div>;
}

          <span className="phase-week-badge">{p.weeks}</span>

            </div>
            <div className="wissen-title">{phase.label}</div>
            <div className="wissen-sub">Sollwerte und Empfehlungen für RDWC/DWC</div>

                {phase.notes.map((n,i)=><li key={i} style={{display:'flex',gap:10,fontSize:13,color:'var(--muted)',lineHeight:1.5}}>

              </ul>
            </div>
          </div>
        </div>
      </div>

// ─── TWEAKS ──────────────────────────────────────────────────────────────────
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "density": "comfortable",
  "values": "mono"
}/*EDITMODE-END*/;

function TweaksPanel({open,tweaks,setTweaks}) {
  return <div className={`tweaks-panel${open?' open':''}`}>
    <div className="tweaks-header">Tweaks</div>
    <div className="tweaks-body">
      <div className="tweak-row">
        <span className="tweak-label">Dichte</span>
        <div className="tweak-control">
          {['compact','comfortable'].map(v=><button key={v} className={`tweak-btn${tweaks.density===v?' active':''}`} onClick={()=>setTweaks(t=>({...t,density:v}))}>
            {v==='compact'?'Kompakt':'Normal'}
          </button>)}
        </div>
      </div>
      <div className="tweak-row">
        <span className="tweak-label">Werte-Font</span>
        <div className="tweak-control">
          {['mono','sans'].map(v=><button key={v} className={`tweak-btn${tweaks.values===v?' active':''}`} onClick={()=>setTweaks(t=>({...t,values:v}))}>
            {v==='mono'?'Mono':'Sans'}
          </button>)}
        </div>
      </div>
    </div>
  </div>;
}

// ─── APP ─────────────────────────────────────────────────────────────────────
function App() {
  const [view,setView]=useState('ops');  // ops, tents, tent-detail, grows, grow-detail, messung, archive, analyse, wissen, settings
  const [tentId,setTentId]=useState(null);
  const [growId,setGrowId]=useState(null);
  const [theme,setTheme]=useState('dark');
  const [tweaksOpen,setTweaksOpen]=useState(false);
  const [tweaks,setTweakVals]=useState(TWEAK_DEFAULTS);

  useEffect(()=>{ document.documentElement.setAttribute('data-theme',theme); },[theme]);
  useEffect(()=>{
    document.documentElement.style.setProperty('--mono', tweaks.values==='mono'?"'IBM Plex Mono',monospace":"'Inter',sans-serif");
  },[tweaks]);

  useEffect(()=>{
    const h=e=>{
      if(e.data?.type==='__activate_edit_mode')   setTweaksOpen(true);
      if(e.data?.type==='__deactivate_edit_mode') setTweaksOpen(false);
    };
    window.addEventListener('message',h);
    window.parent.postMessage({type:'__edit_mode_available'},'*');
    return ()=>window.removeEventListener('message',h);
  },[]);

  const nav=(v)=>{ setView(v); setTentId(null); setGrowId(null); };
  const openTent=(id)=>{ setTentId(id); setView('tent-detail'); };
  const openGrow=(id)=>{ setGrowId(id); setView('grow-detail'); };
  const openMessung=()=>{ setView('messung'); };

  const PAGE_TITLES={ops:'Operations',tents:'Zelte',grows:'Aktive Grows',archive:'Archiv',analyse:'Analyse',wissen:'Wissen',settings:'Einstellungen'};
  const sidebarActive= view.includes('detail')||view==='messung'
    ? (view.includes('tent')?'tents':'grows')
    : view;

  return <div className="app" style={tweaks.density==='compact'?{fontSize:'13px','--radius':'7px'}:{}}>
    <Sidebar active={sidebarActive} onNav={nav} theme={theme} onTheme={()=>setTheme(t=>t==='dark'?'light':'dark')}/>
    <div className="content">
      {/* Plain pages: topbar from view */}
      {!['tent-detail','grow-detail','messung'].includes(view)&&(
        <Topbar title={PAGE_TITLES[view]||view}>
          {view==='grows'&&<button className="btn-ghost btn-accent" onClick={()=>nav('grows')}>+ Neuer Run</button>}
          {view==='settings'&&<button className="btn-ghost btn-accent">Speichern</button>}
        </Topbar>
      )}

      {view==='ops'         && <OpsView onOpenTent={openTent} onOpenGrow={openGrow}/>}
      {view==='tents'       && <div className="page-scroll">
          <div className="stats-row">
            <div className="stat-chip"><strong>2</strong>Aktive Zelte</div>
            <div className="stat-chip"><strong>3</strong>Aktive Runs</div>
          </div>
          <div className="tents-grid">
            {TENTS.map(t=><TentCard key={t.id} tent={t} onOpen={()=>openTent(t.id)} onOpenGrow={openGrow}/>)}
          </div>
        </div>}
      {view==='tent-detail' && <TentDetailView tentId={tentId} onBack={()=>nav('tents')} onOpenGrow={openGrow}/>}
      {view==='grows'       && <GrowsView onOpenGrow={openGrow}/>}
      {view==='grow-detail' && <GrowDetailView growId={growId} onBack={()=>nav('grows')} onMessung={openMessung}/>}
      {view==='messung'     && <MessungView growId={growId} onBack={()=>setView('grow-detail')}/>}
      {view==='archive'     && <div className="page-scroll">
          <div className="section-label">Abgeschlossene Grows</div>
          <div className="data-table">
            <div className="data-table-header grows-cols"><span>Grow</span><span>Ernte</span><span>Ø pH</span><span>Ø EC</span><span>Ertrag</span><span>Status</span></div>
            <div className="data-row grows-cols">
              <div><div className="row-name">Blue Dream #4</div><div className="row-sub">Blue Dream · Zelt A</div></div>
              <div className="row-muted">15.01.2025</div>
              <div className="row-val" style={{color:'var(--green)'}}>6.0</div>
              <div className="row-val">1.8</div>
              <div className="row-val">84 g</div>
              <div><span className="badge badge-neutral">Fertig</span></div>
            </div>
          </div>
        </div>}
      {view==='analyse'     && <AnalyseView/>}
      {view==='wissen'      && <WissenView/>}
      {view==='settings'    && <EinstellungenView/>}
    </div>
    <TweaksPanel open={tweaksOpen} tweaks={tweaks} setTweaks={fn=>{
      setTweakVals(prev=>{
        const next=typeof fn==='function'?fn(prev):fn;
        window.parent.postMessage({type:'__edit_mode_set_keys',edits:next},'*');
        return next;
      });
    }}/>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
<div id="root"></div>
</body>
</html>
