<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#4ecb5b" />
    <title>Grow OS offline</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background: #06100b;
        color: #edf7ef;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          linear-gradient(180deg, rgba(78, 203, 91, 0.12), transparent 38%),
          #06100b;
      }

      main {
        width: min(100%, 520px);
        border: 1px solid rgba(237, 247, 239, 0.16);
        border-radius: 12px;
        padding: 28px;
        background: rgba(9, 24, 16, 0.92);
        box-shadow: 0 24px 70px rgba(0, 0, 0, 0.32);
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(1.7rem, 5vw, 2.4rem);
        line-height: 1.05;
      }

      p {
        margin: 0 0 14px;
        color: #c9d8cd;
        line-height: 1.55;
      }

      a {
        display: inline-flex;
        min-height: 44px;
        align-items: center;
        justify-content: center;
        margin-top: 10px;
        padding: 0 18px;
        border-radius: 8px;
        background: #4ecb5b;
        color: #041008;
        font-weight: 700;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Grow OS offline</h1>
      <p>Die App-Oberflaeche ist zwischengespeichert.</p>
      <p>
        Live-Daten, Messungen, Home Assistant, SOP-Updates, Risiken und Speichern benoetigen
        Verbindung zum Grow-OS-Server.
      </p>
      <a href="/action">Zur Action-Seite</a>
    </main>
  </body>
</html>
