name: Grow OS
version: "1.0.13"
slug: grow_os
description: RDWC/DWC grow management, natively integrated with Home Assistant
url: https://github.com/Nerdstreak/Grow-Operation-System
# Prebuilt public multi-arch image, pulled directly by the Supervisor (the tag
# matches this add-on version; Docker resolves the right architecture). Updates are
# a clean image pull with no on-device rebuild and no data loss.
image: ghcr.io/nerdstreak/grow-operation-system
# The Grow OS image is published multi-arch; these are the Raspberry Pi + PC targets.
arch:
  - aarch64
  - armv7
  - amd64
# Grow OS ships its own dotnet ENTRYPOINT, so the s6 init layer is not needed.
init: false
# Serve the UI inside the Home Assistant sidebar (Home Assistant handles auth).
ingress: true
ingress_port: 5076
panel_icon: mdi:sprout
panel_title: Grow OS
# Grants the add-on a SUPERVISOR_TOKEN with access to the Home Assistant core API
# (http://supervisor/core) — this is what makes the HA connection zero-config.
homeassistant_api: true
