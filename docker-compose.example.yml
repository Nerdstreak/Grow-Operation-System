services:
  grow-os:
    image: grow-os:dev
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5076:5076"
    volumes:
      - ./docker-data/grow-os:/data
    environment:
      - ASPNETCORE_URLS=http://0.0.0.0:5076
      - GROWDIARY_DB_PATH=/data/grow-diary.db
      - GROWDIARY_ALLOW_REMOTE_ADMIN=false
    restart: unless-stopped
